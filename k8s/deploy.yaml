apiVersion: apps/v1
kind: Deployment
metadata:
  name: i27-helpdesk-gateway
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: i27-helpdesk-gateway 
  template:
    metadata:
      labels:
        app: i27-helpdesk-gateway
    spec:
      containers:
        - name: i27-helpdesk-gateway
          image: ${IMAGE_NAME}:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "128Mi"
              cpu: "100m"